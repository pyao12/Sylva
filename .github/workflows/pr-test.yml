name: PR Test

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install build-essential qemu-system-x86 make ovmf -y
    - name: Build OS
      run: make all -j$(nproc)
